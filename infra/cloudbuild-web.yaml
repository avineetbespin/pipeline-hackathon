steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web:${SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web:latest'
      - '-f'
      - 'infra/Dockerfile.web'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pipelinepilot-web'
      - '--image'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'API_URL=https://pipelinepilot-agent-956500419273.us-central1.run.app'
      - '--port'
      - '8080'

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/pipelinepilot/web:latest'
